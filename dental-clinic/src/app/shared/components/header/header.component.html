<header class="header" [class.scrolled]="isScrolled()">
  <div class="container">
    <div class="header__inner">

      <!-- Logo -->
      <a routerLink="/" class="header__logo" (click)="closeMobileMenu()">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z" fill="currentColor" opacity="0.15"/>
            <path d="M11 7h2v4h4v2h-4v4h-2v-4H7v-2h4V7z" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-text">SmileCare</span>
      </a>

      <!-- Desktop Navigation -->
      <nav class="desktop-nav" aria-label="Main navigation">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="nav-link"
          >{{ link.label }}</a>
        }
        <a routerLink="/appointments" class="btn-book">Book Now</a>
      </nav>

      <!-- Hamburger -->
      <button
        class="hamburger"
        [class.open]="mobileMenuOpen()"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="mobileMenuOpen()"
        aria-label="Toggle navigation menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Mobile Drawer -->
    @if (mobileMenuOpen()) {
      <nav class="mobile-nav" aria-label="Mobile navigation">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="mobile-nav-link"
            (click)="closeMobileMenu()"
          >{{ link.label }}</a>
        }
        <a
          routerLink="/appointments"
          class="btn-book mobile-book"
          (click)="closeMobileMenu()"
        >Book Now</a>
      </nav>
    }
  </div>
</header>
